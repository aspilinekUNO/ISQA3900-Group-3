{% extends "base.html" %}
{% block content %}

<h2>Edit User: {{ user_to_edit.username }}</h2>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}

    <button class="btn btn-custom">Save Changes</button>
    <a href="{% url 'user_management' %}" class="btn btn-secondary">Cancel</a>
</form>

<hr>

<h4>Password Reset</h4>
<a href="#" class="btn btn-warning">
    Reset Password
</a>

{% endblock %}
