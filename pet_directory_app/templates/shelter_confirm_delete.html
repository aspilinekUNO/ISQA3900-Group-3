{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <h2>Delete {{ shelter.name }}?</h2>

    <form method="post">
        {% csrf_token %}
        <button class="btn btn-danger">Yes, Delete</button>
        <a href="{% url 'shelter_list' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
