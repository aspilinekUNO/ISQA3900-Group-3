{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <h2>Delete {{ pet.name }}?</h2>

    <form method="post">
        {% csrf_token %}
        <button class="btn btn-danger">Yes Delete</button>
        <a href="{% url 'pet_detail' pet.id %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
